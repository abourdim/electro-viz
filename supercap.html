<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Supercap drag race</title><link rel="stylesheet" href="maker-viz.css"></head><body>
<a class="mv-nav" href="index.html">← Back</a><div id="app"></div>
<script src="maker-viz.js"></script><script>
const DEVS = [
  { n:'Capacitor', t: 0.1, color:'#457B9D', emoji:'⚡' },
  { n:'Supercap',  t: 5,   color:'#FFD700', emoji:'🔋' },
  { n:'Battery',   t: 300, color:'#E63946', emoji:'🔋' }
];
function stage(s){
  return `<svg viewBox="0 0 540 260">
    <rect width="540" height="260" fill="#F4E8CB"/>
    ${DEVS.map((d,i) => {
      const left = Math.max(0, 1 - s.elapsed/d.t);
      const bright = left;
      return `<g transform="translate(${40 + i*160},30)">
        <rect width="120" height="40" fill="${d.color}" stroke="#264653" stroke-width="2" rx="6"/>
        <text x="60" y="26" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFF">${d.emoji} ${d.n}</text>
        <circle cx="60" cy="100" r="${20*Math.max(0.1,bright)+6}" fill="${d.color}" opacity="${Math.max(0.2,bright)}"/>
        <circle cx="60" cy="100" r="18" fill="${bright>0.1?d.color:'#333'}" stroke="#264653" stroke-width="2"/>
        <text x="60" y="140" text-anchor="middle" font-size="11" font-weight="bold" fill="#264653">${bright>0.1?'💡 lit':'⚫ dead'}</text>
        <rect x="10" y="160" width="100" height="16" fill="#EEE" stroke="#264653" stroke-width="1"/>
        <rect x="10" y="160" width="${100*left}" height="16" fill="${d.color}"/>
        <text x="60" y="190" text-anchor="middle" font-size="10" fill="#264653">${(left*100).toFixed(0)}% left</text>
      </g>`;
    }).join('')}
    <text x="270" y="240" text-anchor="middle" font-size="13" font-weight="bold" fill="#264653">time = ${s.elapsed.toFixed(1)}s · capacitor: fastest flash · battery: marathon</text>
  </svg>`;
}
MakerViz.create({mount:'#app',title:'⚡ Capacitor vs Supercap vs Battery',subtitle:'Same voltage, very different endurance!',
  vars:{elapsed:{label:'⏱️ elapsed',value:0,color:'#264653'}},
  lines:['All charged to same voltage','Connect identical LED load','Cap flashes instantly','Battery outlasts them all'],
  phases:['charge','connect','flash','marathon'],onInit(s){s.elapsed=0;},onReset(s){s.elapsed=0;},stage,
  run(p,s,ui){const n=['charge','connect','flash','marathon'].indexOf(p)+1;ui.activeLine(n);s.elapsed+=0.5;ui.setVar('elapsed',s.elapsed,{display:s.elapsed.toFixed(1)+'s'});}
});
</script></body></html>
