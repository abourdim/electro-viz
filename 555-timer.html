<!DOCTYPE html><html><head><meta charset="UTF-8"><title>555 Timer x-ray</title><link rel="stylesheet" href="maker-viz.css"></head><body>
<a class="mv-nav" href="index.html">← Back</a><div id="app"></div>
<script src="maker-viz.js"></script><script>
function stage(s){
  const hi = s.out;
  return `<svg viewBox="0 0 540 240">
    <rect width="540" height="240" fill="#F4E8CB"/>
    <g transform="translate(100,40)">
      <rect width="340" height="160" fill="#2B2B2B" stroke="#FFD700" stroke-width="3" rx="6"/>
      <text x="170" y="22" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFD700">555 x-ray</text>
      <polygon points="30,60 70,60 70,80 50,90 30,80" fill="${s.comp1?'#40BF4A':'#666'}" stroke="#FFF" stroke-width="2"/>
      <text x="50" y="75" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFF">CMP1</text>
      <polygon points="30,110 70,110 70,130 50,140 30,130" fill="${s.comp2?'#40BF4A':'#666'}" stroke="#FFF" stroke-width="2"/>
      <text x="50" y="125" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFF">CMP2</text>
      <rect x="130" y="80" width="60" height="40" fill="${hi?'#E63946':'#457B9D'}" stroke="#FFF" stroke-width="2"/>
      <text x="160" y="106" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFF">FF ${hi?'SET':'RST'}</text>
      <rect x="220" y="80" width="80" height="40" fill="#FFD700" stroke="#FFF" stroke-width="2"/>
      <text x="260" y="106" text-anchor="middle" font-size="11" font-weight="bold" fill="#264653">OUT = ${hi?'HI':'LO'}</text>
      <line x1="70" y1="70" x2="130" y2="90" stroke="#FFD700" stroke-width="1.5"/>
      <line x1="70" y1="120" x2="130" y2="110" stroke="#FFD700" stroke-width="1.5"/>
      <line x1="190" y1="100" x2="220" y2="100" stroke="#FFD700" stroke-width="1.5"/>
    </g>
    <text x="270" y="225" text-anchor="middle" font-size="12" font-weight="bold" fill="#264653">2 comparators + 1 flip-flop + 1 transistor = infinite applications</text>
  </svg>`;
}
MakerViz.create({mount:'#app',title:'🕰️ 555 Timer X-Ray',subtitle:'The legendary chip, demystified!',
  vars:{out:{label:'📤 OUT',value:'LO',color:'#E63946'}},
  lines:['V_cap < 1/3 V? CMP2 fires → SET','V_cap > 2/3 V? CMP1 fires → RESET','Flip-flop drives OUT','Cap charges and discharges cyclically'],
  phases:['low','high','ff','cycle'],onInit(s){s.out=false;s.comp1=false;s.comp2=false;s.v=0;s.dir=1;},onReset(s){s.out=false;s.v=0;s.dir=1;},stage,
  run(p,s,ui){const n=['low','high','ff','cycle'].indexOf(p)+1;ui.activeLine(n);
    if(p==='low'){s.comp2=s.v<33;}
    else if(p==='high'){s.comp1=s.v>66;}
    else if(p==='ff'){if(s.comp2)s.out=true;if(s.comp1)s.out=false;ui.setVar('out',s.out?'HI':'LO',{display:s.out?'HI':'LO',flash:true});}
    else if(p==='cycle'){s.v+=(s.out?5:-5);s.v=Math.max(0,Math.min(100,s.v));}
  }
});
</script></body></html>
