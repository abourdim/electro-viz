<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Ohm's Law — water pipe</title><link rel="stylesheet" href="maker-viz.css"></head><body>
<a class="mv-nav" href="index.html">← Back</a><div id="app"></div>
<script src="maker-viz.js"></script><script>
function stage(s){
  const flow = s.V / Math.max(1, s.R);
  const waterW = Math.max(10, 80 / Math.max(1, s.R) * s.V);
  return `<svg viewBox="0 0 540 240">
    <rect width="540" height="240" fill="#B0E0E6"/>
    <g transform="translate(40,80)"><rect width="60" height="80" fill="#FFD700" stroke="#264653" stroke-width="3" rx="4"/><text x="30" y="45" text-anchor="middle" font-size="12" font-weight="bold" fill="#264653">${s.V}V</text><text x="30" y="60" text-anchor="middle" font-size="10" fill="#264653">PRESSURE</text></g>
    <rect x="100" y="${120 - waterW/2}" width="${140}" height="${waterW}" fill="#457B9D"/>
    <rect x="240" y="100" width="${(100 + (s.R)*2)}" height="40" fill="#666" stroke="#264653" stroke-width="2" rx="3"/>
    <text x="${290 + s.R}" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFF">R=${s.R}Ω</text>
    <g transform="translate(450,100)"><rect width="60" height="40" fill="#FFF" stroke="#264653" stroke-width="2"/><text x="30" y="18" text-anchor="middle" font-size="10" fill="#264653">FLOW</text><text x="30" y="34" text-anchor="middle" font-size="13" font-weight="bold" fill="#E63946">${flow.toFixed(1)}A</text></g>
    <text x="270" y="200" text-anchor="middle" font-size="16" font-weight="bold" fill="#264653">I = V / R = ${s.V} / ${s.R} = ${flow.toFixed(2)}A</text>
  </svg>`;
}
MakerViz.create({mount:'#app', title:'💧 Ohm\'s Law — Water Pipe', subtitle:'Voltage = pressure · Current = flow · Resistance = pipe',
  vars:{V:{label:'🔋 V',value:9,color:'#FFD700',note:'volts'},I:{label:'💧 I',value:0,color:'#457B9D',note:'amps'},R:{label:'🔧 R',value:3,color:'#666',note:'ohms'}},
  extras:[{kind:'slider',id:'vS',label:'V',min:1,max:24,value:9,step:1,onInput(v,s){s.V=v;}},{kind:'slider',id:'rS',label:'R',min:1,max:30,value:3,step:1,onInput(v,s){s.R=v;}}],
  lines:['PRESSURE (V) pushes water','PIPE (R) restricts flow','FLOW (I) = V / R','Change either → flow updates'],
  phases:['read','compute','show','apply'],
  onInit(s){s.V=9;s.R=3;s.I=3;},onReset(s){s.V=9;s.R=3;s.I=3;},stage,
  run(phase,s,ui){const n=['read','compute','show','apply'].indexOf(phase)+1;ui.activeLine(n);
    if(phase==='compute'){s.I=s.V/s.R;ui.setVar('I',s.I,{display:s.I.toFixed(2)+'A',flash:true});ui.narrate(`${s.V}V / ${s.R}Ω = ${s.I.toFixed(2)}A`);}
  }
});
</script></body></html>
