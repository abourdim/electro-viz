<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Multiplexer</title><link rel="stylesheet" href="maker-viz.css"></head><body>
<a class="mv-nav" href="index.html">← Back</a><div id="app"></div>
<script src="maker-viz.js"></script><script>
function stage(s){
  const sel = (s.S1<<1)|s.S0;
  const inputs=[s.D0,s.D1,s.D2,s.D3];
  const out=inputs[sel];
  return `<svg viewBox="0 0 540 260">
    <rect width="540" height="260" fill="#F4E8CB"/>
    ${[0,1,2,3].map(i=>`<g transform="translate(80,${50+i*40})"><circle r="14" fill="${inputs[i]?'#40BF4A':'#666'}" stroke="#264653" stroke-width="2"/><text y="4" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFF">${inputs[i]}</text><text x="22" y="4" font-size="11" font-weight="bold" fill="${sel===i?'#E63946':'#264653'}">D${i}${sel===i?' ←':''}</text></g>`).join('')}
    <g transform="translate(200,90)"><path d="M 0 0 L 100 30 L 100 90 L 0 120 Z" fill="#FFD700" stroke="#264653" stroke-width="3"/><text x="50" y="55" text-anchor="middle" font-size="12" font-weight="bold">MUX</text><text x="50" y="70" text-anchor="middle" font-size="10">4→1</text></g>
    <line x1="300" y1="135" x2="390" y2="135" stroke="#264653" stroke-width="2"/>
    <g transform="translate(410,135)">${out?'<circle r="30" fill="#E63946" opacity="0.3"/>':''}<circle r="22" fill="${out?'#E63946':'#666'}" stroke="#264653" stroke-width="3"/><text y="6" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFF">${out}</text><text y="42" text-anchor="middle" font-size="11" fill="#264653">Y</text></g>
    <text x="270" y="240" text-anchor="middle" font-size="12" font-weight="bold" fill="#264653">Select S1=${s.S1} S0=${s.S0} → D${sel} → Y=${out}</text>
  </svg>`;
}
MakerViz.create({mount:'#app',title:'🎛️ 4-to-1 Multiplexer',subtitle:'Railway switch: pick which input goes to output!',
  vars:{Y:{label:'Y',value:0,color:'#E63946'}},
  extras:[{kind:'toggle',id:'d0',label:'D0',value:false,onToggle(v,s){s.D0=v?1:0;}},{kind:'toggle',id:'d1',label:'D1',value:true,onToggle(v,s){s.D1=v?1:0;}},{kind:'toggle',id:'d2',label:'D2',value:false,onToggle(v,s){s.D2=v?1:0;}},{kind:'toggle',id:'d3',label:'D3',value:true,onToggle(v,s){s.D3=v?1:0;}},{kind:'toggle',id:'s0',label:'S0',value:false,onToggle(v,s){s.S0=v?1:0;}},{kind:'toggle',id:'s1',label:'S1',value:false,onToggle(v,s){s.S1=v?1:0;}}],
  lines:['READ select lines S1,S0','PICK D[sel]','ROUTE to output Y','ALL others ignored'],
  phases:['select','pick','route','ignore'],
  onInit(s){s.D0=0;s.D1=1;s.D2=0;s.D3=1;s.S0=0;s.S1=0;},onReset(s){s.D0=0;s.D1=1;s.D2=0;s.D3=1;s.S0=0;s.S1=0;},stage,
  run(phase,s,ui){const n=['select','pick','route','ignore'].indexOf(phase)+1;ui.activeLine(n);
    if(phase==='pick'){const sel=(s.S1<<1)|s.S0;const y=[s.D0,s.D1,s.D2,s.D3][sel];ui.setVar('Y',y,{display:String(y),flash:true});}
  }
});
</script></body></html>
