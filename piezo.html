<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Piezo spark</title><link rel="stylesheet" href="maker-viz.css"></head><body>
<a class="mv-nav" href="index.html">← Back</a><div id="app"></div>
<script src="maker-viz.js"></script><script>
function stage(s){
  const V = s.pressure * 400;
  return `<svg viewBox="0 0 540 240">
    <rect width="540" height="240" fill="#F4E8CB"/>
    <g transform="translate(100,80)">
      <rect width="60" height="${80 - s.pressure}" fill="#888" stroke="#264653" stroke-width="2"/>
      <rect x="-10" y="${80-s.pressure-15}" width="80" height="15" fill="#666" stroke="#264653" stroke-width="2"/>
    </g>
    <g transform="translate(100,160)">
      <rect width="60" height="${30+s.pressure*0.3}" fill="#FFD700" stroke="#264653" stroke-width="3"/>
      <text x="30" y="${20+s.pressure*0.15}" text-anchor="middle" font-size="11" font-weight="bold" fill="#264653">piezo</text>
    </g>
    <line x1="160" y1="175" x2="380" y2="175" stroke="#264653" stroke-width="2"/>
    <g transform="translate(400,160)">
      <circle r="20" fill="${V>500?'#FFD700':'#333'}" stroke="#264653" stroke-width="3"/>
      ${V>500?Array.from({length:6},(_,i)=>`<line x1="${Math.cos(i*60*Math.PI/180)*18}" y1="${Math.sin(i*60*Math.PI/180)*18}" x2="${Math.cos(i*60*Math.PI/180)*28}" y2="${Math.sin(i*60*Math.PI/180)*28}" stroke="#FFD700" stroke-width="2"/>`).join(''):''}
    </g>
    <text x="270" y="50" text-anchor="middle" font-size="13" font-weight="bold" fill="#264653">press the crystal → ${V.toFixed(0)}V spike!</text>
    <text x="270" y="220" text-anchor="middle" font-size="11" fill="#264653">same physics: BBQ lighters, gas stoves, piezo buzzers</text>
  </svg>`;
}
MakerViz.create({mount:'#app',title:'⚡ Piezo Spark',subtitle:'Squeeze crystal → high-voltage pulse!',
  vars:{pressure:{label:'👊 press',value:0,color:'#E63946'},V:{label:'⚡ V',value:0,color:'#FFD700'}},
  extras:[{kind:'slider',id:'pS',label:'Pressure',min:0,max:50,value:0,step:5,onInput(v,s){s.pressure=v;}}],
  lines:['Crystal has ordered charges','Squeeze → lattice deforms','Charges pushed to surfaces','Voltage spike → spark'],
  phases:['rest','squeeze','shift','spark'],onInit(s){s.pressure=0;s.V=0;},onReset(s){s.pressure=0;s.V=0;},stage,
  run(p,s,ui){const n=['rest','squeeze','shift','spark'].indexOf(p)+1;ui.activeLine(n);if(p==='spark'){s.V=s.pressure*400;ui.setVar('V',s.V,{display:s.V.toFixed(0)+'V',flash:true});}}
});
</script></body></html>
