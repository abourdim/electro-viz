<!DOCTYPE html><html><head><meta charset="UTF-8"><title>PLL</title><link rel="stylesheet" href="maker-viz.css"></head><body>
<a class="mv-nav" href="index.html">← Back</a><div id="app"></div>
<script src="maker-viz.js"></script><script>
function stage(s){
  const W=500, H=70;
  const refPts = Array.from({length:60},(_,i)=>`${(i/59)*W},${H/2 - Math.sin(i*s.fRef*0.1)*25}`).join(' ');
  const vcoPts = Array.from({length:60},(_,i)=>`${(i/59)*W},${H/2 - Math.sin(i*s.fVco*0.1 + s.phase)*25}`).join(' ');
  const locked = Math.abs(s.fRef - s.fVco) < 0.5;
  return `<svg viewBox="0 0 540 260">
    <rect x="10" y="10" width="${W+20}" height="${H+20}" fill="#0A0F1E" stroke="#FFD700" stroke-width="3" rx="8"/>
    <polyline points="${refPts}" fill="none" stroke="#FFD700" stroke-width="2" transform="translate(10,10)"/>
    <text x="20" y="22" font-size="10" fill="#FFD700" font-weight="bold">reference</text>
    <rect x="10" y="100" width="${W+20}" height="${H+20}" fill="#0A0F1E" stroke="#FFD700" stroke-width="3" rx="8"/>
    <polyline points="${vcoPts}" fill="none" stroke="${locked?'#40BF4A':'#E63946'}" stroke-width="2" transform="translate(10,100)"/>
    <text x="20" y="112" font-size="10" fill="${locked?'#40BF4A':'#E63946'}" font-weight="bold">VCO output (chasing ref)</text>
    <text x="270" y="220" text-anchor="middle" font-size="14" font-weight="bold" fill="${locked?'#40BF4A':'#E63946'}">${locked?'🔒 LOCKED':'🔄 acquiring lock...'}</text>
    <text x="270" y="240" text-anchor="middle" font-size="11" fill="#264653">PLLs: radios, clocks, audio codecs, GPS — they\'re everywhere</text>
  </svg>`;
}
MakerViz.create({mount:'#app',title:'🔒 PLL Lock',subtitle:'VCO chases the reference frequency!',
  vars:{fVco:{label:'📟 VCO Hz',value:5,color:'#E63946'},phase:{label:'📐 phase',value:0,color:'#FFD700'}},
  extras:[{kind:'slider',id:'rS',label:'Ref freq',min:1,max:10,value:5,step:0.5,onInput(v,s){s.fRef=v;}}],
  lines:['Phase detector: diff(ref, VCO)','Loop filter averages','VCO tunes toward ref freq','When phases align → locked'],
  phases:['detect','filter','tune','lock'],onInit(s){s.fRef=5;s.fVco=2;s.phase=0;},onReset(s){s.fRef=5;s.fVco=2;s.phase=0;},stage,
  run(p,s,ui){const n=['detect','filter','tune','lock'].indexOf(p)+1;ui.activeLine(n);const err=s.fRef-s.fVco;s.fVco+=err*0.3;ui.setVar('fVco',s.fVco,{display:s.fVco.toFixed(2),flash:true});}
});
</script></body></html>
