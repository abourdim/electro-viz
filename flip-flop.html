<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Flip-Flop</title><link rel="stylesheet" href="maker-viz.css"></head><body>
<a class="mv-nav" href="index.html">← Back</a><div id="app"></div>
<script src="maker-viz.js"></script><script>
function stage(s){
  return `<svg viewBox="0 0 540 240">
    <rect width="540" height="240" fill="#F4E8CB"/>
    <g transform="translate(80,80)"><rect width="80" height="60" fill="#FFD700" stroke="#264653" stroke-width="3" rx="8"/><text x="40" y="30" text-anchor="middle" font-size="11" font-weight="bold">SR latch</text><text x="40" y="46" text-anchor="middle" font-size="10">(2 NOR gates)</text></g>
    <g transform="translate(250,50)"><circle r="18" fill="${s.S?'#40BF4A':'#666'}" stroke="#264653" stroke-width="2"/><text y="4" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFF">S</text></g>
    <g transform="translate(250,160)"><circle r="18" fill="${s.R?'#E63946':'#666'}" stroke="#264653" stroke-width="2"/><text y="4" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFF">R</text></g>
    <g transform="translate(430,110)">
      ${s.Q?'<circle r="30" fill="#E63946" opacity="0.4"/>':''}
      <circle r="24" fill="${s.Q?'#E63946':'#666'}" stroke="#264653" stroke-width="3"/>
      <text y="6" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFF">${s.Q}</text>
      <text y="48" text-anchor="middle" font-size="12" font-weight="bold" fill="#264653">memory</text>
    </g>
    <text x="270" y="220" text-anchor="middle" font-size="12" font-weight="bold" fill="#264653">SET = remember 1 · RESET = remember 0 · else: HOLD last value</text>
  </svg>`;
}
MakerViz.create({mount:'#app',title:'💾 Flip-Flop = 1 Bit of Memory',subtitle:'Set it, release it, it remembers!',
  vars:{Q:{label:'Q',value:0,color:'#E63946'}},
  extras:[{kind:'toggle',id:'sT',label:'SET',value:false,onToggle(v,s){s.S=v?1:0;}},{kind:'toggle',id:'rT',label:'RESET',value:false,onToggle(v,s){s.R=v?1:0;}}],
  lines:['READ S and R','IF S=1 → Q = 1 (set)','IF R=1 → Q = 0 (reset)','ELSE → Q unchanged (hold)'],
  phases:['read','set','reset','hold'],
  onInit(s){s.S=0;s.R=0;s.Q=0;},onReset(s){s.S=0;s.R=0;s.Q=0;},stage,
  run(phase,s,ui){const n=['read','set','reset','hold'].indexOf(phase)+1;ui.activeLine(n);
    if(phase==='set'&&s.S){s.Q=1;ui.setVar('Q',1,{display:'1',flash:true});ui.narrate('🟢 SET latched');}
    else if(phase==='reset'&&s.R){s.Q=0;ui.setVar('Q',0,{display:'0',flash:true});ui.narrate('🔴 RESET');}
    else if(phase==='hold')ui.narrate('🔒 hold: Q='+s.Q);
  }
});
</script></body></html>
