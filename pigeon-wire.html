<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Pigeon on a wire</title><link rel="stylesheet" href="maker-viz.css"></head><body>
<a class="mv-nav" href="index.html">← Back</a><div id="app"></div>
<script src="maker-viz.js"></script><script>
function stage(s){
  const zapped = s.grounded || s.otherWire;
  return `<svg viewBox="0 0 540 240">
    <rect width="540" height="240" fill="#87CEEB"/>
    <line x1="0" y1="100" x2="540" y2="100" stroke="#264653" stroke-width="4"/>
    <text x="20" y="92" font-size="11" fill="#E63946" font-weight="bold">hot wire · +6000V</text>
    ${s.otherWire?'<line x1="0" y1="140" x2="540" y2="140" stroke="#264653" stroke-width="4"/><text x="20" y="132" font-size="11" fill="#E63946" font-weight="bold">other wire · 0V</text>':''}
    <g transform="translate(${zapped?265:260},${zapped?120:85})"><text font-size="${zapped?36:28}">${zapped?'🔥':'🐦'}</text></g>
    ${s.grounded?`<line x1="278" y1="100" x2="278" y2="200" stroke="#FFD700" stroke-width="3"/><text x="290" y="150" font-size="11" fill="#E63946" font-weight="bold">grounded!</text>`:''}
    ${zapped?'<g transform="translate(260,110)"><text font-size="20">⚡</text></g>':''}
    <text x="270" y="220" text-anchor="middle" font-size="12" font-weight="bold" fill="${zapped?'#E63946':'#264653'}">${zapped?'💥 current has a path through the bird':'✅ both feet same wire = same potential = no current'}</text>
  </svg>`;
}
MakerViz.create({mount:'#app',title:'🐦 Pigeon on a Wire',subtitle:'Why birds don\'t get shocked!',
  vars:{safe:{label:'🛡️ safe',value:'yes',color:'#40BF4A'}},
  extras:[{kind:'toggle',id:'gT',label:'Touch ground',value:false,onToggle(v,s){s.grounded=v;}},{kind:'toggle',id:'oT',label:'Touch other wire',value:false,onToggle(v,s){s.otherWire=v;}}],
  lines:['Current needs a path with voltage difference','Both bird feet at same potential','No voltage across bird → no current','Touch second wire or ground → path'],
  phases:['same','drop','no_current','danger'],onInit(s){s.grounded=false;s.otherWire=false;},onReset(s){s.grounded=false;s.otherWire=false;},stage,
  run(p,s,ui){const n=['same','drop','no_current','danger'].indexOf(p)+1;ui.activeLine(n);ui.setVar('safe',(s.grounded||s.otherWire)?'ZAP':'yes',{display:(s.grounded||s.otherWire)?'ZAP':'yes',flash:true});}
});
</script></body></html>
